name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/var/www/Basecamp_Project-Management-Platform
            git pull origin main
            npm install
            npm run build
            pm2 restart basecamp-app || pm2 start npm --name "basecamp-app" -- start